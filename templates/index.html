<!DOCTYPE html>
<html>
<head>
    <title>AI Energy & Carbon Predictor</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background: linear-gradient(to bottom, #e0f2e0, #f0f8f0); 
            padding: 40px; 
            margin: 0;
        }
        h1 { color: #2e8b57; font-size: 36px; margin-bottom: 10px; }
        .subtitle { color: #555; font-size: 18px; margin-bottom: 30px; }
        form { 
            max-width: 520px; 
            margin: 0 auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        label { display: block; text-align: left; margin: 15px 0 5px; font-weight: bold; color: #333; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
        }
        button { 
            background: #2e8b57; 
            color: white; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 8px; 
            font-size: 20px; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        button:hover { background: #3cb371; }
        .footer { margin-top: 50px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🌍 AI Energy & Carbon Footprint Predictor</h1>
    <p class="subtitle">Sustainability Project - GTU Internship 2026</p>
    
    <form method="POST">
        <label>How many people live in your house?</label>
        <input type="number" name="people" value="4" required>
        
        <label>AC usage hours per day?</label>
        <input type="number" name="ac_hours" value="8" required>
        
        <label>Monthly electricity bill (₹)?</label>
        <input type="number" name="bill" value="2500" required>
        
        <label>Your city?</label>
        <input type="text" name="city" value="Ahmedabad" required>
        
        <button type="submit">🚀 Predict My Carbon Footprint</button>
    </form>

    <div class="footer">
        Built with for GTU Internship | Domain 3: Sustainability
    </div>
</body>
</html>
